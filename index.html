<div id="toastMsg" class="toast-msg"></div></p>

<script>
    // ---------- 存储KEY ----------
    const STORAGE_KEY = "simple_blog_posts";

    // ---------- 全局变量 ----------
    let posts = [];            // 文章数组 { id, title, content, imageBase64, date }
    let pendingImageFile = null;      // 未发布的临时图片文件对象
    let isPublishing = false;

    // DOM 元素
    const titleInput = document.getElementById('postTitle');
    const contentInput = document.getElementById('postContent');
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const publishBtn = document.getElementById('publishBtn');
    const clearFormBtn = document.getElementById('clearFormBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const postsContainer = document.getElementById('postsContainer');
    const postCountSpan = document.getElementById('postCount');

    // ---------- 辅助函数：提示浮层 ----------
    function showToast(message, duration = 2200) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, duration);
    }

    // ---------- 图片压缩 (返回base64, 自动限制宽度&质量) ----------
    function compressImageToBase64(file, maxWidth = 850, quality = 0.75) {
        return new Promise((resolve, reject) => {
            if (!file || !file.type.match('image.*')) {
                resolve('');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    // 计算缩放比例
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    // 绘制白色背景 (避免透明变黑)
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);
                    // 根据原类型决定输出格式，优先 JPEG 减少体积，但保留透明图会失真 -> 若原图是png无透明区域也ok，兼顾体积使用jpeg
                    let mimeType = 'image/jpeg';
                    // 如果是 png 且可能存在透明，保留 png 但质量稍降
                    if (file.type === 'image/png') {
                        mimeType = 'image/png';
                    } else if (file.type === 'image/webp') {
                        mimeType = 'image/webp';
                    } else {
                        mimeType = 'image/jpeg';
                    }
                    const finalQuality = (mimeType === 'image/png') ? 0.85 : quality;
                    const base64 = canvas.toDataURL(mimeType, finalQuality);
                    resolve(base64);
                };
                img.onerror = () => reject(new Error('图片加载失败'));
                img.src = e.target.result;
            };
            reader.onerror = () => reject(new Error('文件读取失败'));
            reader.readAsDataURL(file);
        });
    }

    // 预览图片 (本地快速预览，不压缩，仅视觉)
    function previewLocalImage(file) {
        if (!file) {
            imagePreview.classList.remove('show');
            imagePreview.src = '';
            return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            imagePreview.src = e.target.result;
            imagePreview.classList.add('show');
        };
        reader.readAsDataURL(file);
    }

    // 重置表单 (清除输入和图片预览)
    function resetForm() {
        titleInput.value = '';
        contentInput.value = '';
        imageInput.value = '';
        imagePreview.classList.remove('show');
        imagePreview.src = '';
        pendingImageFile = null;
    }

    // 渲染所有文章
    function renderPosts() {
        if (!postsContainer) return;
        if (!posts.length) {
            postsContainer.innerHTML = `<div class="empty-state">📭 还没有任何文章，点击左侧「发布文章」开始记录吧~</div>`;
            postCountSpan.innerText = '0篇';
            return;
        }
        postCountSpan.innerText = posts.length + (posts.length > 1 ? '篇' : '篇');
        let html = '';
        for (let i = 0; i < posts.length; i++) {
            const post = posts[i];
            // 安全处理正文换行
            const safeContent = escapeHtml(post.content);
            // 图片展示（如果有）
            let imageHtml = '';
            if (post.imageBase64 && post.imageBase64.trim() !== '') {
                imageHtml = `<img class="card-img" src="${post.imageBase64}" alt="博客配图" loading="lazy">`;
            }
            html += `
                <div class="blog-card" data-id="${post.id}">
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(post.title) || '无题'}</div>
                        <div class="card-meta">
                            <span>📅 ${post.date}</span>
                        </div>
                        ${imageHtml}
                        <div class="card-text" style="white-space: pre-wrap;">${safeContent}</div>
                    </div>
                    <div class="card-actions">
                        <button class="delete-btn" data-id="${post.id}">🗑️ 删除</button>
                    </div>
                </div>
            `;
        }
        postsContainer.innerHTML = html;

        // 绑定删除按钮事件
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                deletePostById(id);
            });
        });
    }

    // 简单的防XSS转义
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 保存文章到 localStorage 并重新渲染
    function savePostsToLocal() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
        renderPosts();
    }

    // 删除文章
    function deletePostById(id) {
        const index = posts.findIndex(p => p.id === id);
        if (index !== -1) {
            posts.splice(index, 1);
            savePostsToLocal();
            showToast('✖️ 文章已删除', 1500);
        }
    }

    // 清空所有文章（二次确认）
    function clearAllPosts() {
        if (posts.length === 0) {
            showToast('📭 目前没有文章可清空', 1200);
            return;
        }
        const confirmClear = confirm('⚠️ 此操作将清空你所有的博客文章，且无法恢复！确定要清空吗？');
        if (confirmClear) {
            posts = [];
            savePostsToLocal();
            showToast('✨ 已清空所有文章', 1600);
            resetForm();
        }
    }

    // 添加新文章 (核心)
    async function publishNewPost() {
        if (isPublishing) {
            showToast('⏳ 正在发布中，请稍后...', 1000);
            return;
        }
        const title = titleInput.value.trim();
        const content = contentInput.value.trim();
        if (!title && !content) {
            showToast('❓ 至少填写标题或正文内容吧～', 1800);
            return;
        }
        if (!title) {
            showToast('📌 请填写一个标题', 1500);
            return;
        }
        // 开始发布
        isPublishing = true;
        publishBtn.disabled = true;
        publishBtn.textContent = '⏳ 发布中...';

        try {
            let finalImageBase64 = '';
            // 如果有待上传的图片文件，压缩转换
            if (pendingImageFile) {
                try {
                    finalImageBase64 = await compressImageToBase64(pendingImageFile, 900, 0.72);
                    if (!finalImageBase64) {
                        showToast('🖼️ 图片处理失败，将不包含图片发布', 1500);
                    } else {
                        showToast('🖼️ 图片已压缩并嵌入', 1200);
                    }
                } catch (err) {
                    console.warn(err);
                    showToast('⚠️ 图片压缩失败，跳过图片', 1500);
                    finalImageBase64 = '';
                }
            }

            const newPost = {
                id: Date.now(),
                title: title.slice(0, 100),
                content: content || '（无正文）',
                imageBase64: finalImageBase64 || '',
                date: new Date().toLocaleString('zh-CN', { hour12: false })
            };
            posts.unshift(newPost);   // 最新文章在上方
            savePostsToLocal();
            // 重置表单
            resetForm();
            showToast(`🎉 文章《${escapeHtml(title.slice(0, 30))}》发布成功！`, 2000);
        } catch (error) {
            console.error(error);
            showToast('😭 发布失败，请重试', 2000);
        } finally {
            isPublishing = false;
            publishBtn.disabled = false;
            publishBtn.textContent = '✨ 发布文章';
        }
    }

    // 清空草稿
    function clearDraft() {
        if (titleInput.value.trim() !== '' || contentInput.value.trim() !== '' || pendingImageFile !== null) {
            if (confirm('清空草稿会丢失未发布的内容，确定清空吗？')) {
                resetForm();
                showToast('🍃 草稿已清空', 1200);
            }
        } else {
            showToast('📭 没有需要清空的草稿', 1000);
        }
    }

    // 图片选择的监听
    function bindImageUpload() {
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) {
                pendingImageFile = null;
                imagePreview.classList.remove('show');
                imagePreview.src = '';
                return;
            }
            // 检验大小 限制 12MB 以内 (压缩会降质)
            if (file.size > 12 * 1024 * 1024) {
                showToast('⚠️ 图片超过12MB，请选择较小的图片', 2000);
                imageInput.value = '';
                pendingImageFile = null;
                imagePreview.classList.remove('show');
                return;
            }
            pendingImageFile = file;
            previewLocalImage(file);
        });
    }

    // 加载存储的文章
    function loadPostsFromStorage() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                posts = JSON.parse(stored);
                // 确保每个文章都有必要字段，并且兼容旧数据
                if (!Array.isArray(posts)) posts = [];
                posts = posts.filter(p => p && typeof p === 'object').map(p => {
                    return {
                        id: p.id || Date.now() + Math.random(),
                        title: p.title || '无标题',
                        content: p.content || '',
                        imageBase64: p.imageBase64 || '',
                        date: p.date || new Date().toLocaleString('zh-CN')
                    };
                });
            } catch(e) { posts = []; }
        }
        // 如果没有文章，添加一篇示例演示（让博客不空，且友好）
        if (posts.length === 0) {
            const demoImage = ''; // 不预设图片，避免长base64
            const demoPost = {
                id: 1700000000000,
                title: '🌱 欢迎来到你的博客',
                content: '在这里，你可以上传图片和文字记录生活。\n\n✨ 点左侧「发布文章」试试：\n- 写一段文字\n- 选一张照片（会自动压缩）\n- 点击发布，文章就会出现在右侧～\n\n所有数据都存在你自己的浏览器里，关闭页面也不会丢失。',
                imageBase64: '',
                date: new Date().toLocaleString('zh-CN')
            };
            const demoPost2 = {
                id: 1700000000001,
                title: '📸 图片示例',
                content: '你可以为文章配图，分享所见之美。点击删除按钮可移除文章。',
                imageBase64: '',
                date: new Date().toLocaleString('zh-CN')
            };
            posts = [demoPost, demoPost2];
            savePostsToLocal();
        } else {
            renderPosts();
        }
    }

    // ---------- 初始化事件绑定 ----------
    function init() {
        loadPostsFromStorage();
        bindImageUpload();
        publishBtn.addEventListener('click', publishNewPost);
        clearFormBtn.addEventListener('click', clearDraft);
        clearAllBtn.addEventListener('click', clearAllPosts);
        // 额外防抖：回车不提交
        const formInputs = [titleInput, contentInput];
        formInputs.forEach(inp => {
            inp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && e.target === titleInput) {
                    e.preventDefault();
                    publishNewPost();
                }
            });
        });
        // 如果用户重新选择文件但未发布，预览已经ok
    }

    // 启动
    init();
</script>
